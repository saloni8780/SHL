services:
  - type: web
    name: shl-recommender
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLEAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
